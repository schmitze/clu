# ============================================================
# clu – Global Configuration
# ============================================================
# This file controls launcher behavior, default adapter,
# and global settings that apply across all projects.
# ============================================================

# Which agent framework adapter to use by default.
# Available: claude-code | aider | cursor | custom
default_adapter: claude-code

# Default project to open when you run `clu` with no arguments.
# Set to null to always show the project picker.
default_project: null

# Default working directory for agent sessions.
# Limits the agent's scope — it won't start from $HOME unless you set it to ~.
# Set during `clu bootstrap`. Examples: ~/repos, ~/projects, ~/code
default_workdir: ~/repos

# Interactive picker tool (used when default_project is null).
# Options: fzf | gum | basic (built-in bash select)
picker: basic

# ── Session behavior ──────────────────────────────────────────

# Automatically run the summarizer pass at end of session?
auto_summarize: true

# If true, proposed memory writes need explicit user confirmation.
# If false, writes happen automatically (not recommended).
confirm_memory_writes: true

# Staleness threshold in days – memory files older than this
# get flagged at session start.
memory_staleness_days: 30

# Maximum chars for the assembled prompt (CLAUDE.md).
# If exceeded, the launcher progressively trims memory detail.
# Claude Code warns at 40000. Leave headroom for adapter overhead.
prompt_budget_chars: 38000

# ── Persona system ────────────────────────────────────────────

# Enable dynamic persona routing (agent switches roles automatically).
# If false, uses the project's default persona only.
dynamic_personas: true

# Enable trait learning — agent logs behavioral signals and
# proposes trait adjustments based on accumulated evidence.
# Requires dynamic_personas: true.
trait_learning: true

# ── Plugins & MCP servers ───────────────────────────────────────
# Managed by `clu import` — lists plugins/MCP to restore on a new machine.
# `clu bootstrap` will offer to install missing ones.

plugins:
  - superpowers@superpowers-marketplace
  - scientific-skills@claude-scientific-skills
  - impeccable@impeccable
  - feature-dev@claude-plugins-official
  - code-review@claude-plugins-official
  - ralph-loop@claude-plugins-official

mcp_servers:
  - name: playwright
    command: npx
    args: ["@playwright/mcp@latest"]

# ── Paths (override only if you move things around) ───────────

paths:
  personas: personas/
  shared: shared/
  projects: projects/
  templates: templates/
  adapters: adapters/

# ── Adapter-specific overrides ────────────────────────────────

adapters:
  claude-code:
    # Extra CLI flags passed to claude every time.
    extra_flags: ""
    # Where to write the assembled CLAUDE.md (temp location).
    staging_dir: /tmp/clu
  aider:
    model: claude-sonnet-4-20250514
    extra_flags: ""
  cursor:
    rules_file: .cursorrules
